name: Deploy Supabase (Migrations + Edge Functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy all Edge Functions
        run: |
          for dir in supabase/functions/*/; do
            func_name=$(basename "$dir")
            # Skip shared utilities directory
            if [ "$func_name" = "_shared" ]; then
              continue
            fi
            echo "Deploying function: $func_name"
            supabase functions deploy "$func_name" --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Migrations pushed and Edge Functions deployed successfully!"
          echo "Project: ${{ secrets.SUPABASE_PROJECT_ID }}"
